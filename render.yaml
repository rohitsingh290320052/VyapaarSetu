# Render manifest for RetailLink
# Connect this repo in Render and deploy the services defined below.

services:
  - type: web
    name: retailink-backend
    env: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    buildCommand: ""
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET_KEY
        # Set the value in the Render dashboard for security (do NOT commit secret here)
        value: "REPLACE_ME"
      - key: DATABASE_URL
        fromDatabase:
          name: retailink-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: https://<your-frontend-url>

databases:
  - name: retailink-db
